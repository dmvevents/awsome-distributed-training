# ============================================================
# RayJob: Qwen2.5-1.5B GRPO + NVRx on P5en (H200)
# ============================================================
# Pattern: NVRx wrapper (no ft_launcher) + RayJob backoffLimit
# EFA upgrade: head does runtime build + copies libs to FSx
# Workers: pick up EFA libs from FSx via LD_LIBRARY_PATH
#
# NVRx features:
#   - Heartbeat monitoring via run_grpo_nvrx.py
#   - Straggler detection (NVRx Detector)
#   - GPU health check at startup
#   - NVSentinel event logging to FSx
#   - Checkpoints on FSx for resume across retries
#
# Demo flow:
#   1. Deploy → head builds EFA (~2 min), training starts (~9s/step)
#   2. Inject fault: kill -9 the run_grpo.py process
#   3. RayJob detects failure, retries with fresh cluster
#   4. Training resumes from latest FSx checkpoint
#
# Fault injection:
#   HEAD=$(kubectl get pod -n antonai -l app=grpo-nvrx-rayjob,ray.io/node-type=head \
#     -o jsonpath='{.items[0].metadata.name}')
#   kubectl exec $HEAD -n antonai -- bash -c \
#     'PID=$(ps aux | grep "[r]un_grpo" | grep -v ft_launcher | \
#      head -1 | awk "{print \$2}"); echo "Kill $PID"; kill -9 $PID'
#
# Deploy:
#   kubectl apply -f p5en-rayjob-nvrx.yaml
# ============================================================
apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: grpo-nvrx-rayjob
  namespace: antonai
  labels:
    app: grpo-nvrx-rayjob
spec:
  entrypoint: bash /shared/nvrx-demo/scripts/rayjob_countdown_entrypoint.sh
  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 600
  activeDeadlineSeconds: 14400
  backoffLimit: 2

  rayClusterSpec:
    rayVersion: '2.49.2'

    headGroupSpec:
      rayStartParams:
        dashboard-host: '0.0.0.0'
        num-gpus: '8'
        num-cpus: '64'
      template:
        metadata:
          labels:
            app: grpo-nvrx-rayjob
        spec:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          nodeSelector:
            node.kubernetes.io/instance-type: p5en.48xlarge
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"
          containers:
            - name: ray-head
              image: public.ecr.aws/v9l4g5s4/nemo-rl-workshop:p5en
              imagePullPolicy: Always
              securityContext:
                privileged: true
              ports:
                - containerPort: 6379
                  name: gcs-server
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
              env: &common-env
                # EFA libs from FSx (built by head entrypoint)
                - name: LD_LIBRARY_PATH
                  value: "/opt/amazon/ofi-nccl/lib:/opt/amazon/efa/lib:/usr/local/cuda/lib64:/usr/lib/x86_64-linux-gnu"
                - name: NCCL_NET_PLUGIN
                  value: "ofi"
                - name: NCCL_SOCKET_IFNAME
                  value: "^lo,docker,veth,eni"
                - name: NCCL_DEBUG
                  value: "WARN"
                - name: NCCL_TIMEOUT
                  value: "7200"
                - name: TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC
                  value: "7200"
                - name: FI_PROVIDER
                  value: "efa"
                - name: FI_EFA_USE_DEVICE_RDMA
                  value: "1"
                - name: FI_EFA_FORK_SAFE
                  value: "1"
                - name: RDMAV_FORK_SAFE
                  value: "1"
                - name: FI_EFA_USE_HUGE_PAGE
                  value: "0"
                - name: FI_MR_CACHE_MONITOR
                  value: "disabled"
                - name: FI_HMEM_CUDA_USE_GDRCOPY
                  value: "1"
                - name: NCCL_NET_GDR_LEVEL
                  value: "PHB"
                - name: NCCL_CUMEM_ENABLE
                  value: "0"
                - name: NCCL_NVLS_ENABLE
                  value: "0"
                - name: CLEAR_CHECKPOINTS
                  value: "1"
                - name: GRPO_MODEL
                  value: "Qwen/Qwen2.5-0.5B-Instruct"
                - name: GRPO_MAX_STEPS
                  value: "100"
                - name: HF_HOME
                  value: "/shared/nvrx-demo/hf_cache"
                - name: HF_DATASETS_CACHE
                  value: "/shared/nvrx-demo/hf_datasets"
                - name: TORCH_HOME
                  value: "/shared/nvrx-demo/torch_cache"
                - name: TRITON_CACHE_DIR
                  value: "/shared/nvrx-demo/triton_cache"
                - name: RAY_worker_register_timeout_seconds
                  value: "600"
              lifecycle:
                preStop:
                  exec:
                    command: ["/bin/sh", "-c", "ray stop"]
              resources:
                limits:
                  nvidia.com/gpu: 8
                  vpc.amazonaws.com/efa: 16
                  memory: 900Gi
                requests:
                  nvidia.com/gpu: 8
                  vpc.amazonaws.com/efa: 16
                  memory: 700Gi
                  cpu: 64
              volumeMounts: &common-mounts
                - name: fsx
                  mountPath: /shared
                - name: shm
                  mountPath: /dev/shm
                - name: dev-infiniband
                  mountPath: /dev/infiniband
          volumes: &common-volumes
            - name: fsx
              persistentVolumeClaim:
                claimName: fsx-pvc
            - name: shm
              emptyDir:
                medium: Memory
                sizeLimit: 128Gi
            - name: dev-infiniband
              hostPath:
                path: /dev/infiniband
                type: DirectoryOrCreate

    workerGroupSpecs:
      - groupName: gpu-workers
        replicas: 1
        minReplicas: 1
        maxReplicas: 1
        rayStartParams:
          num-gpus: '8'
          num-cpus: '64'
        template:
          metadata:
            labels:
              app: grpo-nvrx-rayjob
          spec:
            hostNetwork: true
            dnsPolicy: ClusterFirstWithHostNet
            nodeSelector:
              node.kubernetes.io/instance-type: p5en.48xlarge
            tolerations:
              - key: "nvidia.com/gpu"
                operator: "Exists"
                effect: "NoSchedule"
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchLabels:
                        app: grpo-nvrx-rayjob
                    topologyKey: kubernetes.io/hostname
            containers:
              - name: ray-worker
                image: public.ecr.aws/v9l4g5s4/nemo-rl-workshop:p5en
                imagePullPolicy: Always
                securityContext:
                  privileged: true
                env: *common-env
                lifecycle:
                  preStop:
                    exec:
                      command: ["/bin/sh", "-c", "ray stop"]
                resources:
                  limits:
                    nvidia.com/gpu: 8
                    vpc.amazonaws.com/efa: 16
                    memory: 900Gi
                  requests:
                    nvidia.com/gpu: 8
                    vpc.amazonaws.com/efa: 16
                    memory: 700Gi
                    cpu: 64
                volumeMounts: *common-mounts
            volumes: *common-volumes
